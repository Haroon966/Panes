services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - '3001:3001'
    environment:
      - SHELL_DEFAULT=fish
      - PORT=3001
    volumes:
      - ${HOME}/.config/fish:/root/.config/fish:ro
      - terminalai-data:/root/.config/terminalai
    env_file:
      - path: .env
        required: false

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - '5173:5173'
    environment:
      - VITE_API_BASE_URL=http://localhost:3001
    depends_on:
      - server

volumes:
  terminalai-data:
