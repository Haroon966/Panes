<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420" role="img" aria-label="TerminalAI layout: terminal and chat panel">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c6af7"/>
      <stop offset="100%" style="stop-color:#a594f9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  <rect x="16" y="16" width="768" height="388" rx="12" fill="#0f0f17" stroke="#1e1e2e" stroke-width="1"/>
  <!-- Terminal region -->
  <rect x="280" y="32" width="488" height="356" rx="8" fill="#0a0a0f" stroke="#2a2a42" stroke-width="1"/>
  <text x="296" y="56" fill="#8585a8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="600">TERMINAL</text>
  <text x="296" y="88" fill="#4a4a6a" font-family="ui-monospace,monospace" font-size="12">~/project</text>
  <text x="296" y="108" fill="#e8e8f0" font-family="ui-monospace,monospace" font-size="12">$ npm run build</text>
  <text x="296" y="132" fill="#f59e0b" font-family="ui-monospace,monospace" font-size="11" text-decoration="underline">Error: Command failed</text>
  <text x="296" y="156" fill="#4a4a6a" font-family="ui-monospace,monospace" font-size="12">$ _</text>
  <rect x="280" y="348" width="488" height="40" rx="0" fill="#14141e" stroke="#1e1e2e" stroke-width="1"/>
  <circle cx="300" cy="368" r="4" fill="#3b82f6"/>
  <text x="312" y="372" fill="#8585a8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10">RUNNING</text>
  <!-- Chat panel -->
  <rect x="32" y="32" width="232" height="356" rx="8" fill="#14141e" stroke="#2a2a42" stroke-width="1"/>
  <rect x="32" y="32" width="232" height="40" rx="8" fill="#14141e"/>
  <text x="48" y="56" fill="url(#accent)" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700">TerminalAI</text>
  <rect x="44" y="72" width="200" height="28" rx="6" fill="#0f0f17" stroke="#1e1e2e"/>
  <text x="56" y="90" fill="#8585a8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10">gpt-4o ľ</text>
  <rect x="44" y="112" width="180" height="64" rx="8" fill="#1a1a28" stroke="#2a2a42"/>
  <text x="56" y="136" fill="#e8e8f0" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">Fix this build error&</text>
  <rect x="56" y="200" width="160" height="24" rx="6" fill="#7c6af7"/>
  <text x="72" y="216" fill="#fff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="600">¶ npm install</text>
  <text x="32" y="404" fill="#4a4a6a" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9">Illustrative layout  replace with a screen recording if you prefer.</text>
</svg>
